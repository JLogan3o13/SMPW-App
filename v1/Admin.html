<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LV Transportation - Route Admin</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        
        .header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }
        
        select, button {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        select:focus, button:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        button:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        .bulk-actions {
            background: #fff3cd;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            border-left: 4px solid #ffc107;
        }
        
        .bulk-actions h4 {
            margin: 0 0 15px 0;
            color: #856404;
        }
        
        .bulk-controls {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 15px;
            align-items: end;
        }
        
        .emergency-btn {
            background: #dc3545 !important;
        }
        
        .emergency-btn:hover {
            background: #c82333 !important;
        }
        
        .locations-container {
            padding: 30px;
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .status-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .status-route1 { background: #d4edda; color: #155724; }
        .status-route2 { background: #fff3cd; color: #856404; }
        .status-route3 { background: #f8d7da; color: #721c24; }
        
        .locations-grid {
            display: grid;
            gap: 15px;
        }
        
        .location-card {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .location-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .location-card.selected {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .location-card.route1 { border-left: 5px solid #28a745; }
        .location-card.route2 { border-left: 5px solid #ffc107; }
        .location-card.route3 { border-left: 5px solid #dc3545; }
        
        .location-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .location-info {
            flex: 1;
        }
        
        .location-name {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 5px;
            color: #212529;
        }
        
        .zone-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .route-status {
            text-align: right;
        }
        
        .current-route {
            font-size: 14px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .current-route.route1 { background: #d4edda; color: #155724; }
        .current-route.route2 { background: #fff3cd; color: #856404; }  
        .current-route.route3 { background: #f8d7da; color: #721c24; }
        
        .select-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .bulk-controls {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .status-bar {
                flex-direction: column;
                gap: 10px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="header">
            <h1>ðŸš— Route Control Center</h1>
            <p>Emergency route management for live events</p>
        </div>
        
        <div class="controls">
            <div class="form-row">
                <div class="form-group">
                    <label for="eventSelect">Event</label>
                    <select id="eventSelect">
                        <option value="">Loading events...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="zoneSelect">Zone</label>
                    <select id="zoneSelect" disabled>
                        <option value="">Select event first</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>&nbsp;</label>
                    <button id="loadLocations" disabled>Load Locations</button>
                </div>
            </div>
            
            <div class="bulk-actions" id="bulkActions" style="display: none;">
                <h4>âš¡ Bulk Route Changes</h4>
                <div class="bulk-controls">
                    <div class="form-group">
                        <label for="bulkRoute">Change selected to:</label>
                        <select id="bulkRoute">
                            <option value="Route1">Route 1 (Preferred)</option>
                            <option value="Route2">Route 2 (Secondary)</option>
                            <option value="Route3">Route 3 (Emergency)</option>
                        </select>
                    </div>
                    <button id="selectAll">Select All</button>
                    <button id="updateRoutes" class="emergency-btn" disabled>Update Routes</button>
                </div>
            </div>
        </div>
        
        <div class="locations-container">
            <div class="status-bar" id="statusBar" style="display: none;"></div>
            
            <div class="message" id="messageArea"></div>
            
            <div class="loading" id="loadingArea" style="display: none;">
                <div class="spinner"></div>
                <p>Loading locations...</p>
            </div>
            
            <div class="locations-grid" id="locationsGrid"></div>
        </div>
    </div>

    <script>
        // Configuration - UPDATE THESE URLs
        const API_BASE_URL = 'https://630rul04gh.execute-api.us-west-1.amazonaws.com/prod/destinations';
        const UPDATE_API_URL = 'https://630rul04gh.execute-api.us-west-1.amazonaws.com/prod/update-routes';
        
        // State
        let currentEvent = '';
        let currentZone = '';
        let locations = [];
        let selectedLocations = [];
        
        // DOM elements
        const eventSelect = document.getElementById('eventSelect');
        const zoneSelect = document.getElementById('zoneSelect');
        const loadLocationsBtn = document.getElementById('loadLocations');
        const bulkActions = document.getElementById('bulkActions');
        const bulkRoute = document.getElementById('bulkRoute');
        const selectAllBtn = document.getElementById('selectAll');
        const updateRoutesBtn = document.getElementById('updateRoutes');
        const statusBar = document.getElementById('statusBar');
        const messageArea = document.getElementById('messageArea');
        const loadingArea = document.getElementById('loadingArea');
        const locationsGrid = document.getElementById('locationsGrid');
        
        // Initialize
        loadEvents();
        
        // Load available events
        async function loadEvents() {
            try {
                // Get events by scanning all data and extracting unique EventIDs
                // For simplicity, we'll hardcode the known events for now
                const knownEvents = ['RaidersGames', 'Formula1'];
                
                eventSelect.innerHTML = '<option value="">-- Select Event --</option>';
                knownEvents.forEach(event => {
                    const option = document.createElement('option');
                    option.value = event;
                    option.textContent = event;
                    eventSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading events:', error);
                showMessage('Error loading events', 'error');
            }
        }
        
        // Event listeners
        eventSelect.addEventListener('change', async function() {
            currentEvent = this.value;
            zoneSelect.innerHTML = '<option value="">Loading zones...</option>';
            zoneSelect.disabled = true;
            loadLocationsBtn.disabled = true;
            
            if (currentEvent) {
                await loadZones();
            }
        });
        
        zoneSelect.addEventListener('change', function() {
            currentZone = this.value;
            loadLocationsBtn.disabled = !currentZone;
        });
        
        loadLocationsBtn.addEventListener('click', loadLocations);
        selectAllBtn.addEventListener('click', selectAllLocations);
        updateRoutesBtn.addEventListener('click', updateSelectedRoutes);
        
        // Load zones for selected event
        async function loadZones() {
            try {
                const response = await fetch(`${API_BASE_URL}?event=${currentEvent}`);
                const data = await response.json();
                
                zoneSelect.innerHTML = '<option value="">-- Select Zone --</option>';
                if (data.zones && data.zones.length > 0) {
                    data.zones.forEach(zone => {
                        const option = document.createElement('option');
                        option.value = zone;
                        option.textContent = `Zone ${zone}`;
                        zoneSelect.appendChild(option);
                    });
                    zoneSelect.disabled = false;
                }
            } catch (error) {
                console.error('Error loading zones:', error);
                showMessage('Error loading zones', 'error');
            }
        }
        
        // Load locations for selected event and zone
        async function loadLocations() {
            showLoading(true);
            
            try {
                const response = await fetch(`${API_BASE_URL}?event=${currentEvent}&zone=${currentZone}`);
                const data = await response.json();
                
                locations = data.locations || [];
                selectedLocations = [];
                
                renderLocations();
                updateStatusBar();
                bulkActions.style.display = locations.length > 0 ? 'block' : 'none';
                
            } catch (error) {
                console.error('Error loading locations:', error);
                showMessage('Error loading locations', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // Render locations grid
        function renderLocations() {
            if (locations.length === 0) {
                locationsGrid.innerHTML = '<p>No locations found for this zone.</p>';
                return;
            }
            
            locationsGrid.innerHTML = locations.map((location, index) => `
                <div class="location-card ${location.activeRoute.toLowerCase()}" data-index="${index}">
                    <div class="location-header">
                        <div class="location-info">
                            <div class="location-name">${location.label}</div>
                            <span class="zone-badge">Zone ${currentZone}</span>
                        </div>
                        <div class="route-status">
                            <div class="current-route ${location.activeRoute.toLowerCase()}">${location.activeRoute}</div>
                            <input type="checkbox" class="select-checkbox" data-index="${index}">
                        </div>
                    </div>
                </div>
            `).join('');
            
            // Add event listeners to checkboxes
            document.querySelectorAll('.select-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', updateSelections);
            });
        }
        
        // Update selected locations
        function updateSelections() {
            selectedLocations = [];
            document.querySelectorAll('.select-checkbox:checked').forEach(checkbox => {
                const index = parseInt(checkbox.dataset.index);
                selectedLocations.push(index);
                checkbox.closest('.location-card').classList.add('selected');
            });
            
            document.querySelectorAll('.select-checkbox:not(:checked)').forEach(checkbox => {
                checkbox.closest('.location-card').classList.remove('selected');
            });
            
            updateRoutesBtn.disabled = selectedLocations.length === 0;
            updateRoutesBtn.textContent = selectedLocations.length > 0 
                ? `Update ${selectedLocations.length} Route${selectedLocations.length > 1 ? 's' : ''}` 
                : 'Update Routes';
        }
        
        // Select all locations
        function selectAllLocations() {
            const checkboxes = document.querySelectorAll('.select-checkbox');
            const allSelected = selectedLocations.length === locations.length;
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = !allSelected;
            });
            
            updateSelections();
        }
        
        // Update selected routes
        async function updateSelectedRoutes() {
            if (selectedLocations.length === 0) return;
            
            const newRoute = bulkRoute.value;
            const updates = selectedLocations.map(index => ({
                zone: currentZone,
                label: locations[index].label,
                newRoute: newRoute
            }));
            
            updateRoutesBtn.disabled = true;
            updateRoutesBtn.textContent = 'Updating...';
            
            try {
                const response = await fetch(UPDATE_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        eventId: currentEvent,
                        updates: updates
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`Successfully updated ${result.successCount} routes to ${newRoute}`, 'success');
                    // Reload locations to show updated status
                    await loadLocations();
                } else {
                    showMessage(`Error: ${result.error}`, 'error');
                }
                
            } catch (error) {
                console.error('Error updating routes:', error);
                showMessage('Error updating routes', 'error');
            } finally {
                updateRoutesBtn.disabled = false;
                updateRoutesBtn.textContent = 'Update Routes';
            }
        }
        
        // Update status bar
        function updateStatusBar() {
            if (locations.length === 0) {
                statusBar.style.display = 'none';
                return;
            }
            
            const counts = { Route1: 0, Route2: 0, Route3: 0 };
            locations.forEach(location => {
                counts[location.activeRoute]++;
            });
            
            statusBar.innerHTML = Object.entries(counts)
                .filter(([route, count]) => count > 0)
                .map(([route, count]) => 
                    `<div class="status-item status-${route.toLowerCase()}">${count} on ${route}</div>`
                ).join('');
                
            statusBar.style.display = 'flex';
        }
        
        // Show loading state
        function showLoading(show) {
            loadingArea.style.display = show ? 'block' : 'none';
            locationsGrid.style.display = show ? 'none' : 'block';
        }
        
        // Show message
        function showMessage(message, type) {
            messageArea.textContent = message;
            messageArea.className = `message ${type}`;
            messageArea.style.display = 'block';
            
            setTimeout(() => {
                messageArea.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
