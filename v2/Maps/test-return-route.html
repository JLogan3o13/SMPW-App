<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Route Geometry Test</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_URL = "https://630rul04gh.execute-api.us-west-1.amazonaws.com/prod/destinations?event=RaidersGames&zone=E";

    const map = L.map('map').setView([36.08, -115.24], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);

    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        console.log("API response:", data);
		const loc = data.locations.find(l => l.returnRouteGeometry);
		if (!loc) {
			alert("No locations with routeGeometry found");
			return;
		}

        const routeLayer = L.geoJSON(loc.returnRouteGeometry).addTo(map);
        map.fitBounds(routeLayer.getBounds(), { padding: [20, 20] });
      })
      .catch(err => {
        console.error("Error loading route:", err);
        alert("Error loading route, see console");
      });
  </script>
</body>
</html>
